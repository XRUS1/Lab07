<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab07 A-Frame</title>
<style>
  body { margin: 0; overflow: hidden; font-family: sans-serif; background: #000; }
  #ui { 
    position: absolute; top: 0; left: 0; z-index: 10; 
    padding: 1em; background: rgba(0,0,0,0.8); color: white; 
    font-size: 0.9em;
  }
</style>
<!-- A-Frame 1.3.0 (compatible con MindAR) -->
<script src="https://aframe.io/releases/1.3.0/aframe.min.js"></script>
<!-- MindAR para A-Frame -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

<div id="ui">⏳ Iniciando cámara AR...</div>

<a-scene 
  mindar-image="imageTargetSrc: ./targets.mind"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <!-- Precarga modelos -->
  <a-assets timeout="30000">
    <a-asset-item id="blue-model" src="./models/Blue.glb"></a-asset-item>
    <a-asset-item id="red-model" src="./models/Red.glb"></a-asset-item>
  </a-assets>

  <!-- Cámara fija (MindAR la controla) -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Luces -->
  <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
  <a-light type="directional" color="#ffffff" intensity="0.8" position="1 1 1"></a-light>

  <!-- Target 0: Azul -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model src="#blue-model" scale="1.5 1.5 1.5" position="0 0.05 0.05"></a-gltf-model>
  </a-entity>

  <!-- Target 1: Rojo -->
  <a-entity mindar-image-target="targetIndex: 1">
    <a-gltf-model src="#red-model" scale="1.5 1.5 1.5" position="0 0.05 0.05"></a-gltf-model>
  </a-entity>

</a-scene>

<script>
const ui = document.getElementById('ui');
const scene = document.querySelector('a-scene');

// Escena lista
scene.addEventListener('loaded', () => {
  ui.textContent = '✅ Cámara OK. Muestra una tarjeta.';
});

// Target 0 (azul)
const target0 = document.querySelector('[mindar-image-target="targetIndex: 0"]');
target0.addEventListener('targetFound', () => {
  ui.textContent = '🎯 AZUL detectado';
  console.log('AZUL FOUND');
});
target0.addEventListener('targetLost', () => {
  ui.textContent = '👀 Buscando...';
  console.log('AZUL LOST');
});

// Target 1 (rojo)
const target1 = document.querySelector('[mindar-image-target="targetIndex: 1"]');
target1.addEventListener('targetFound', () => {
  ui.textContent = '🎯 ROJO detectado';
  console.log('ROJO FOUND');
});
target1.addEventListener('targetLost', () => {
  ui.textContent = '👀 Buscando...';
  console.log('ROJO LOST');
});
</script>

</body>
</html>
