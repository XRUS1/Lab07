<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<title>Lab07: Dragones AR - MindAR</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { 
    touch-action: none; 
    overflow: hidden; 
    width: 100vw; 
    height: 100vh; 
    background: #000; 
    font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
  }
  #ui { 
    position: absolute; 
    top: 0; 
    left: 0; 
    z-index: 10; 
    padding: 1.2em; 
    max-width: 420px; 
    background: rgba(0,0,0,0.85); 
    backdrop-filter: blur(12px); 
    border-radius: 0 0 16px 0; 
    border-right: 1px solid rgba(255,255,255,0.1);
    border-bottom: 1px solid rgba(255,255,255,0.1);
  }
  h1 { 
    font-size: 1.2em; 
    color: #ffd43b; 
    margin-bottom: 0.3em; 
    display: flex; 
    align-items: center; 
    gap: 0.4em;
  }
  p { 
    font-size: 0.82em; 
    color: #aaa; 
    margin-bottom: 0.8em; 
    line-height: 1.4;
  }
  #status { 
    margin-top: 0.6em; 
    font-size: 0.85em; 
    color: #ccc; 
    min-height: 1.4em; 
    font-weight: 500;
  }
  #status.ok { color: #51cf66; }
  #status.err { color: #ff6b6b; }
  #status.info { color: #74c0fc; }
  #status.warn { color: #ffd43b; }
  
  .target-indicator {
    margin-top: 0.6em;
    display: flex;
    gap: 0.5em;
    flex-wrap: wrap;
  }
  .badge {
    font-size: 0.75em;
    padding: 0.3em 0.6em;
    border-radius: 6px;
    background: rgba(255,255,255,0.1);
    color: #888;
    border: 1px solid rgba(255,255,255,0.05);
    transition: all 0.3s ease;
  }
  .badge.active-blue {
    background: rgba(80, 168, 252, 0.25);
    color: #50a8fc;
    border-color: rgba(80, 168, 252, 0.4);
  }
  .badge.active-red {
    background: rgba(255, 80, 80, 0.25);
    color: #ff5050;
    border-color: rgba(255, 80, 80, 0.4);
  }
  
  #debug { 
    margin-top: 0.8em; 
    font-size: 0.72em; 
    color: #888; 
    max-height: 160px; 
    overflow-y: auto; 
    line-height: 1.5;
  }
  #debug::-webkit-scrollbar { width: 4px; }
  #debug::-webkit-scrollbar-thumb { background: rgba(255,255,255,0.2); border-radius: 2px; }
</style>

<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
  }
}
</script>
</head>
<body>

<div id="ui">
  <h1>🐉 Lab07: Dragones AR</h1>
  <p>Apunta la cámara a una tarjeta. Azul = animación FlyIdle, Rojo = animación base.</p>
  <div id="status">Iniciando MindAR...</div>
  <div class="target-indicator">
    <span class="badge" id="badge-blue">🔵 Azul</span>
    <span class="badge" id="badge-red">🔴 Rojo</span>
  </div>
  <div id="debug"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MindARThree } from 'mindar-image-three';

const statusEl = document.getElementById('status');
const debugEl = document.getElementById('debug');
const badgeBlue = document.getElementById('badge-blue');
const badgeRed = document.getElementById('badge-red');

function log(msg) {
  console.log(msg);
  const line = document.createElement('div');
  line.textContent = msg;
  debugEl.appendChild(line);
  debugEl.scrollTop = debugEl.scrollHeight;
}

// Verificar targets.mind
log('Verificando targets.mind...');
fetch('./targets.mind')
  .then(r => {
    if (!r.ok) throw new Error('Status: ' + r.status);
    log('✅ targets.mind OK (' + r.status + ')');
    iniciarMindAR();
  })
  .catch(err => {
    log('❌ Error targets.mind: ' + err.message);
    statusEl.textContent = '❌ Error: targets.mind no encontrado';
    statusEl.className = 'err';
  });

async function iniciarMindAR() {
  try {
    log('Creando MindARThree...');
    
    const mindarThree = new MindARThree({
      container: document.body,
      imageTargetSrc: './targets.mind'
    });

    const { renderer, scene, camera } = mindarThree;
    
    // Configuración de render para modelos GLB modernos
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    
    log('✅ MindARThree creado');

    // Luces globales
    scene.add(new THREE.HemisphereLight(0xa5a5a5, 0x898989, 3));
    const dirLight = new THREE.DirectionalLight(0xffffff, 3);
    dirLight.position.set(1, 1, 1).normalize();
    scene.add(dirLight);
    log('✅ Luces globales añadidas');

    // ============================================
    // CONFIGURACIÓN DE DRAGONES
    // ============================================
    
    const dragones = [
      {
        id: 'blue',
        targetIndex: 0,
        modelPath: './models/Blue.glb',
        animIndex: 4,
        color: '#50a8fc',
        badge: badgeBlue,
        anchor: null,
        mixer: null,
        model: null,
        container: null,
        visible: false,
        lostTimer: null
      },
      {
        id: 'red',
        targetIndex: 1,
        modelPath: './models/Red.glb',
        animIndex: 0,
        color: '#ff5050',
        badge: badgeRed,
        anchor: null,
        mixer: null,
        model: null,
        container: null,
        visible: false,
        lostTimer: null
      }
    ];

    const loader = new GLTFLoader();
    const clock = new THREE.Clock();

    // ============================================
    // CREAR ANCHORS Y CARGAR MODELOS
    // ============================================
    
    for (const dragon of dragones) {
      log(`Creando anchor [${dragon.id}] para targetIndex ${dragon.targetIndex}...`);
      
      const anchor = mindarThree.addAnchor(dragon.targetIndex);
      dragon.anchor = anchor;
      
      // DEBUG: Cubo visible inmediatamente para verificar tracking
      // Se oculta cuando el modelo GLB termina de cargar
      const debugGeo = new THREE.BoxGeometry(0.08, 0.08, 0.08);
      const debugMat = new THREE.MeshBasicMaterial({ 
        color: dragon.id === 'blue' ? 0x50a8fc : 0xff5050,
        wireframe: true 
      });
      const debugCube = new THREE.Mesh(debugGeo, debugMat);
      debugCube.position.set(0, 0.05, 0.05);
      anchor.group.add(debugCube);
      
      // Ejes de referencia
      const axesHelper = new THREE.AxesHelper(0.1);
      anchor.group.add(axesHelper);
      
      // Eventos con DEBOUNCE para evitar fluctuación LOST/FOUND
      anchor.onTargetFound = () => {
        if (dragon.lostTimer) {
          clearTimeout(dragon.lostTimer);
          dragon.lostTimer = null;
        }
        if (!dragon.visible) {
          dragon.visible = true;
          dragon.badge.classList.add(`active-${dragon.id}`);
          statusEl.textContent = `🎯 ¡Dragón ${dragon.id.toUpperCase()} detectado!`;
          statusEl.className = 'ok';
          log(`🎯 [${dragon.id}] Target FOUND`);
          
          // Reanudar animación
          if (dragon.mixer) dragon.mixer.timeScale = 1;
        }
      };
      
      anchor.onTargetLost = () => {
        // Debounce: esperar 400ms antes de declarar LOST
        // Esto evita el parpadeo cuando el tracking es inestable
        if (!dragon.lostTimer) {
          dragon.lostTimer = setTimeout(() => {
            dragon.visible = false;
            dragon.badge.classList.remove(`active-${dragon.id}`);
            dragon.lostTimer = null;
            
            const otro = dragones.find(d => d.id !== dragon.id);
            if (otro && otro.visible) {
              statusEl.textContent = `👀 Dragón ${otro.id.toUpperCase()} visible`;
              statusEl.className = 'ok';
            } else {
              statusEl.textContent = '👀 Buscando tarjetas...';
              statusEl.className = 'info';
            }
            log(`👀 [${dragon.id}] Target LOST (debounced)`);
            
            // Pausar animación
            if (dragon.mixer) dragon.mixer.timeScale = 0;
          }, 400);
        }
      };

      // Cargar modelo GLB
      log(`⏳ Cargando ${dragon.modelPath}...`);
      
      loader.load(dragon.modelPath, (gltf) => {
        log(`✅ [${dragon.id}] Modelo cargado. Animaciones: ${gltf.animations.length}`);
        
        // Ocultar cubo de debug
        debugCube.visible = false;
        
        const container = new THREE.Group();
        const model = gltf.scene;
        
        // Escala idéntica a tu versión original
        container.scale.set(1.5, 1.5, 1.5);
        container.rotation.y = 0;
        
        // Centrar modelo
        const box = new THREE.Box3().setFromObject(model);
        const center = box.getCenter(new THREE.Vector3());
        model.position.set(-center.x, -center.y, -center.z);
        
        container.add(model);
        container.position.set(0, 0.05, 0.05);
        
        anchor.group.add(container);
        dragon.container = container;
        dragon.model = model;

        log(`✅ [${dragon.id}] Modelo añadido al anchor`);

        // Configurar animación
        if (gltf.animations && gltf.animations.length > 0) {
          const mixer = new THREE.AnimationMixer(model);
          dragon.mixer = mixer;
          
          const indice = dragon.animIndex;
          const clip = gltf.animations[indice] || gltf.animations[0];
          log(`🎬 [${dragon.id}] Animación [${indice}]: ${clip.name}`);
          
          const action = mixer.clipAction(clip);
          action.play();
          
          // Iniciar pausado hasta que se detecte el target
          mixer.timeScale = 0;
        } else {
          log(`⚠️ [${dragon.id}] Sin animaciones en el modelo`);
        }

      }, 
      (xhr) => {
        if (xhr.total > 0) {
          const pct = Math.round((xhr.loaded / xhr.total) * 100);
          if (pct % 25 === 0) log(`⏳ [${dragon.id}] Modelo: ${pct}%`);
        }
      },
      (err) => {
        log(`❌ [${dragon.id}] Error modelo: ${err.message}`);
        statusEl.textContent = `❌ Error al cargar ${dragon.id}`;
        statusEl.className = 'err';
        console.error(err);
      });
    }

    // ============================================
    // RENDER LOOP OFICIAL (CORREGIDO)
    // ============================================
    
    // MindARThree NO tiene .onUpdate. Usamos setAnimationLoop como en tu
    // código original que funcionaba. El renderer.render() es necesario.
    
    renderer.setAnimationLoop(() => {
      const delta = clock.getDelta();
      
      // Actualizar animaciones de dragones visibles
      for (const dragon of dragones) {
        if (dragon.mixer && dragon.visible) {
          dragon.mixer.update(delta);
        }
      }
      
      renderer.render(scene, camera);
    });
    log('✅ Render loop iniciado');

    // ============================================
    // INICIAR CÁMARA
    // ============================================
    
    log('Iniciando cámara...');
    await mindarThree.start();
    log('✅ Cámara iniciada');
    
    statusEl.textContent = '✅ Listo. Muestra una tarjeta.';
    statusEl.className = 'ok';

  } catch (err) {
    log('❌ Error general: ' + err.message);
    statusEl.textContent = '❌ Error: ' + err.message;
    statusEl.className = 'err';
    console.error(err);
  }
}
</script>

</body>
</html>
