<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<title>Lab07: Dos Dragones AR - MindAR</title>
<style>
  * { box-sizing: border-box; margin: 0; }
  body { touch-action: none; overflow: hidden; width: 100vw; height: 100vh; background: #000; }
  #ui { position: absolute; top: 0; left: 0; z-index: 10; padding: 1.2em; max-width: 400px; background: rgba(0,0,0,0.82); backdrop-filter: blur(10px); border-radius: 0 0 16px 0; font-family: sans-serif; }
  h1 { font-size: 1.15em; color: #50a8fc; margin-bottom: 0.4em; }
  p { font-size: 0.8em; color: #aaa; margin-bottom: 1em; }
  #status { margin-top: 0.8em; font-size: 0.85em; color: #ccc; min-height: 1.4em; }
  #status.ok { color: #51cf66; }
  #status.err { color: #ff6b6b; }
  #status.info { color: #74c0fc; }
  #debug { margin-top: 1em; font-size: 0.7em; color: #888; max-height: 200px; overflow-y: auto; }
</style>

<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
  }
}
</script>
</head>
<body>

<div id="ui">
  <h1>🐉🐉 Lab07: Dos Dragones AR</h1>
  <p>Apunta la cámara a la tarjeta azul. Verás ambos dragones.</p>
  <div id="status">Iniciando...</div>
  <div id="debug"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MindARThree } from 'mindar-image-three';

const statusEl = document.getElementById('status');
const debugEl = document.getElementById('debug');

function log(msg) {
  console.log(msg);
  debugEl.innerHTML += msg + '<br>';
  debugEl.scrollTop = debugEl.scrollHeight;
}

// Verificar targets.mind (solo tiene la tarjeta azul)
log('Verificando targets.mind...');
fetch('./targets.mind')
  .then(r => {
    if (!r.ok) throw new Error('Status: ' + r.status);
    log('✅ targets.mind OK (' + r.status + ')');
    iniciarMindAR();
  })
  .catch(err => {
    log('❌ Error targets.mind: ' + err.message);
    statusEl.textContent = '❌ Error: targets.mind no encontrado';
    statusEl.className = 'err';
  });

async function iniciarMindAR() {
  try {
    log('Creando MindARThree...');
    
    const mindarThree = new MindARThree({
      container: document.body,
      imageTargetSrc: './targets.mind'
    });

    const { renderer, scene, camera } = mindarThree;
    
    renderer.outputColorSpace = THREE.SRGBColorSpace;
    renderer.toneMapping = THREE.ACESFilmicToneMapping;
    
    log('✅ MindARThree creado');

    // Luces
    scene.add(new THREE.HemisphereLight(0xa5a5a5, 0x898989, 3));
    const dirLight = new THREE.DirectionalLight(0xffffff, 3);
    dirLight.position.set(1, 1, 1).normalize();
    scene.add(dirLight);
    log('✅ Luces añadidas');

    // UN SOLO ANCHOR (targetIndex: 0 - tarjeta azul)
    log('Creando anchor...');
    const anchor = mindarThree.addAnchor(0);
    
    const axesHelper = new THREE.AxesHelper(0.1);
    anchor.group.add(axesHelper);
    log('✅ Anchor + ejes creados');

    // Eventos del anchor
    anchor.onTargetFound = () => {
      statusEl.textContent = '🎯 ¡Dragones detectados!';
      statusEl.className = 'ok';
      log('🎯 Target FOUND');
    };
    
    anchor.onTargetLost = () => {
      statusEl.textContent = '👀 Buscando tarjeta...';
      statusEl.className = 'info';
      log('👀 Target LOST');
    };

    const loader = new GLTFLoader();
    const mixers = [];
    const clock = new THREE.Clock();

    // ============================================
    // CARGAR DRAGÓN AZUL (izquierda)
    // ============================================
    loader.load('./models/Blue.glb', (gltf) => {
      log('✅ Blue.glb cargado. Animaciones: ' + gltf.animations.length);
      
      const container = new THREE.Group();
      const model = gltf.scene;
      
      container.scale.set(1.5, 1.5, 1.5);
      container.rotation.y = 0;
      
      // Centrar
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.set(-center.x, -center.y, -center.z);
      
      container.add(model);
      
      // POSICIÓN: a la izquierda del anchor
      container.position.set(-0.4, 0.05, 0.05);
      
      anchor.group.add(container);
      log('✅ Azul añadido a la izquierda');

      // Animación 4 (FlyIdle)
      if (gltf.animations && gltf.animations.length > 0) {
        const mixer = new THREE.AnimationMixer(model);
        const clip = gltf.animations[4] || gltf.animations[0];
        log('🎬 Azul [' + 4 + ']: ' + clip.name);
        mixer.clipAction(clip).play();
        mixers.push(mixer);
      }
    }, undefined, (err) => {
      log('❌ Error Blue: ' + err.message);
    });

    // ============================================
    // CARGAR DRAGÓN ROJO (derecha)
    // ============================================
    loader.load('./models/Red.glb', (gltf) => {
      log('✅ Red.glb cargado. Animaciones: ' + gltf.animations.length);
      
      const container = new THREE.Group();
      const model = gltf.scene;
      
      // Resetear transformación del nodo raíz (por si Unity bakeó algo)
      model.position.set(0, 0, 0);
      model.rotation.set(0, 0, 0);
      model.scale.set(1, 1, 1);
      
      container.scale.set(1.5, 1.5, 1.5);
      
      // Centrar
      const box = new THREE.Box3().setFromObject(model);
      const center = box.getCenter(new THREE.Vector3());
      model.position.set(-center.x, -center.y, -center.z);
      
      container.add(model);
      
      // POSICIÓN: a la derecha del anchor
      container.position.set(0.4, 0.05, 0.05);
      
      anchor.group.add(container);
      log('✅ Rojo añadido a la derecha');

      // Animación 5 (Fly Float)
      if (gltf.animations && gltf.animations.length > 0) {
        const mixer = new THREE.AnimationMixer(model);
        const clip = gltf.animations[5] || gltf.animations[0];
        log('🎬 Rojo [' + 5 + ']: ' + clip.name);
        mixer.clipAction(clip).play();
        mixers.push(mixer);
      }
    }, undefined, (err) => {
      log('❌ Error Red: ' + err.message);
    });

    // Loop de animación
    renderer.setAnimationLoop(() => {
      const delta = clock.getDelta();
      for (const mixer of mixers) {
        mixer.update(delta);
      }
      renderer.render(scene, camera);
    });
    log('✅ Loop iniciado');

    // Iniciar cámara
    log('Iniciando cámara...');
    await mindarThree.start();
    log('✅ Cámara iniciada');
    statusEl.textContent = '✅ Listo. Muestra tarjeta azul.';
    statusEl.className = 'ok';

  } catch (err) {
    log('❌ Error general: ' + err.message);
    statusEl.textContent = '❌ Error: ' + err.message;
    statusEl.className = 'err';
    console.error(err);
  }
}
</script>

</body>
</html>
