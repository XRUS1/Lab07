<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab07: Dragones AR - MindAR</title>
<style>
  body { margin: 0; overflow: hidden; font-family: sans-serif; }
  #ui {
    position: absolute; top: 0; left: 0; z-index: 10;
    padding: 1em; background: rgba(0,0,0,0.8); color: #fff;
    font-size: 0.9em; max-width: 400px; border-radius: 0 0 12px 0;
  }
  .badge { display: inline-block; padding: 0.3em 0.6em; margin: 0.2em; border-radius: 4px; background: #333; color: #888; font-size: 0.8em; }
  .badge.on-blue { background: rgba(80,168,252,0.3); color: #50a8fc; }
  .badge.on-red { background: rgba(255,80,80,0.3); color: #ff5050; }
</style>

<!-- A-Frame 1.5.0 (versión oficial de MindAR) -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<!-- aframe-extras para animation-mixer -->
<script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
<!-- MindAR para A-Frame -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

<div id="ui">
  <h2>🐉 Lab07: Dragones AR</h2>
  <div id="status">⏳ Iniciando cámara...</div>
  <div>
    <span class="badge" id="b-blue">🔵 Azul</span>
    <span class="badge" id="b-red">🔴 Rojo</span>
  </div>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001"
  embedded
  color-space="sRGB"
  renderer="colorManagement: true; physicallyCorrectLights: true; alpha: true"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false">

  <!-- Precarga de modelos -->
  <a-assets>
    <a-asset-item id="blue-model" src="./models/Blue.glb"></a-asset-item>
    <a-asset-item id="red-model" src="./models/Red.glb"></a-asset-item>
  </a-assets>

  <!-- Cámara fija (MindAR la controla) -->
  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <!-- Luces -->
  <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
  <a-light type="directional" color="#ffffff" intensity="0.8" position="1 1 1"></a-light>

  <!-- Target 0: Dragón Azul -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model
      src="#blue-model"
      scale="1.5 1.5 1.5"
      position="0 0.05 0.05"
      rotation="0 0 0"
      animation-mixer="clip: FlyIdle; loop: repeat">
    </a-gltf-model>
  </a-entity>

  <!-- Target 1: Dragón Rojo -->
  <a-entity mindar-image-target="targetIndex: 1">
    <a-gltf-model
      src="#red-model"
      scale="1.5 1.5 1.5"
      position="0 0.05 0.05"
      rotation="0 0 0"
      animation-mixer="clip: Fly Float; loop: repeat">
    </a-gltf-model>
  </a-entity>

</a-scene>

<script>
const status = document.getElementById('status');
const bBlue = document.getElementById('b-blue');
const bRed = document.getElementById('b-red');

// Eventos Azul
const t0 = document.querySelector('[mindar-image-target="targetIndex: 0"]');
t0.addEventListener('targetFound', () => {
  bBlue.classList.add('on-blue');
  status.textContent = '🎯 Azul detectado';
});
t0.addEventListener('targetLost', () => {
  bBlue.classList.remove('on-blue');
  status.textContent = '👀 Buscando...';
});

// Eventos Rojo
const t1 = document.querySelector('[mindar-image-target="targetIndex: 1"]');
t1.addEventListener('targetFound', () => {
  bRed.classList.add('on-red');
  status.textContent = '🎯 Rojo detectado';
});
t1.addEventListener('targetLost', () => {
  bRed.classList.remove('on-red');
  status.textContent = '👀 Buscando...';
});

// Escena lista
document.querySelector('a-scene').addEventListener('loaded', () => {
  status.textContent = '✅ Listo. Muestra una tarjeta.';
});
</script>

</body>
</html>
