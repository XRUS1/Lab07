<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<title>Lab07: Dragones AR</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { overflow: hidden; width: 100vw; height: 100vh; background: #000; font-family: sans-serif; }
  #ui { position: absolute; top: 0; left: 0; z-index: 10; padding: 1em; background: rgba(0,0,0,0.8); color: #fff; font-size: 0.9em; max-width: 400px; }
  .badge { display: inline-block; padding: 0.2em 0.5em; margin: 0.2em; border-radius: 4px; background: #333; color: #888; font-size: 0.8em; }
  .badge.on { background: #51cf66; color: #000; }
</style>
<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
  }
}
</script>
</head>
<body>
<div id="ui">
  <h2>🐉 Lab07</h2>
  <div id="status">Iniciando...</div>
  <div>
    <span class="badge" id="b-blue">🔵 Azul</span>
    <span class="badge" id="b-red">🔴 Rojo</span>
  </div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MindARThree } from 'mindar-image-three';

const status = document.getElementById('status');
const bBlue = document.getElementById('b-blue');
const bRed = document.getElementById('b-red');

fetch('./targets.mind')
  .then(r => r.ok ? iniciar() : Promise.reject(r.status))
  .catch(e => status.textContent = '❌ targets.mind: ' + e);

async function iniciar() {
  const mindar = new MindARThree({
    container: document.body,
    imageTargetSrc: './targets.mind',
    filterMinCF: 0.0001,
    filterBeta: 0.001
  });

  const { renderer, scene, camera } = mindar;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
  scene.add(new THREE.DirectionalLight(0xffffff, 1));

  const loader = new GLTFLoader();
  const clock = new THREE.Clock();

  // ============================================
  // AZUL: target 0, Blue.glb, animación 4
  // ============================================
  const anchor0 = mindar.addAnchor(0);
  const cube0 = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 0.1, 0.1),
    new THREE.MeshBasicMaterial({ color: 0x50a8fc, wireframe: true })
  );
  anchor0.group.add(cube0);

  anchor0.onTargetFound = () => { bBlue.classList.add('on'); status.textContent = '🎯 Azul'; };
  anchor0.onTargetLost = () => { bBlue.classList.remove('on'); status.textContent = '👀 Buscando'; };

  loader.load('./models/Blue.glb', (gltf) => {
    cube0.visible = false;
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const c = box.getCenter(new THREE.Vector3());
    model.position.set(-c.x, -c.y, -c.z);

    const container = new THREE.Group();
    container.scale.set(1.5, 1.5, 1.5);
    container.position.set(0, 0.05, 0.05);
    container.add(model);
    anchor0.group.add(container);

    if (gltf.animations[4]) {
      const mixer = new THREE.AnimationMixer(model);
      mixer.clipAction(gltf.animations[4]).play();
      mindar.onUpdate = (dt) => mixer.update(dt);
    }
  });

  // ============================================
  // ROJO: target 1, Red.glb, animación 5
  // DIFERENCIA CLAVE: NO centramos con Box3.
  // El GLB del SoulEater ya está centrado (verificado en Babylon.js).
  // El esqueleto distorsiona el Box3, así que lo dejamos tal cual.
  // ============================================
  const anchor1 = mindar.addAnchor(1);
  const cube1 = new THREE.Mesh(
    new THREE.BoxGeometry(0.1, 0.1, 0.1),
    new THREE.MeshBasicMaterial({ color: 0xff0000, wireframe: true })
  );
  anchor1.group.add(cube1);

  anchor1.onTargetFound = () => { bRed.classList.add('on'); status.textContent = '🎯 Rojo'; };
  anchor1.onTargetLost = () => { bRed.classList.remove('on'); status.textContent = '👀 Buscando'; };

  loader.load('./models/Red.glb', (gltf) => {
    cube1.visible = false;
    const model = gltf.scene;

    // NO centramos. El GLB ya está bien.
    // Solo escala y posición sobre la tarjeta.
    const container = new THREE.Group();
    container.scale.set(1.5, 1.5, 1.5);
    container.position.set(0, 0.05, 0.05);
    container.add(model);
    anchor1.group.add(container);

    if (gltf.animations[5]) {
      const mixer = new THREE.AnimationMixer(model);
      mixer.clipAction(gltf.animations[5]).play();
      const oldUpdate = mindar.onUpdate;
      mindar.onUpdate = (dt) => { oldUpdate && oldUpdate(dt); mixer.update(dt); };
    }
  });

  renderer.setAnimationLoop(() => renderer.render(scene, camera));
  await mindar.start();
  status.textContent = '✅ Listo. Muestra tarjeta.';
}
</script>
</body>
</html>
