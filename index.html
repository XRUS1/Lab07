<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lab07: Dragones AR</title>
<style>
  html, body {
    margin: 0;
    padding: 0;
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: sans-serif;
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 100;
    padding: 0.8em 1em;
    background: rgba(0,0,0,0.75);
    color: #fff;
    font-size: 0.85em;
    border-radius: 8px;
    pointer-events: none;
    max-width: 350px;
  }
  .badge {
    display: inline-block;
    padding: 0.2em 0.5em;
    margin: 0.15em;
    border-radius: 4px;
    background: #444;
    color: #aaa;
    font-size: 0.8em;
  }
  .badge.on-blue { background: #50a8fc; color: #000; }
  .badge.on-red { background: #ff5050; color: #000; }
</style>

<!-- A-Frame 1.5.0 -->
<script src="https://aframe.io/releases/1.5.0/aframe.min.js"></script>
<!-- aframe-extras -->
<script src="https://cdn.jsdelivr.net/gh/donmccurdy/aframe-extras@v7.0.0/dist/aframe-extras.min.js"></script>
<!-- MindAR -->
<script src="https://cdn.jsdelivr.net/npm/mind-ar@1.2.5/dist/mindar-image-aframe.prod.js"></script>
</head>
<body>

<div id="ui">
  <h3 style="margin:0 0 0.3em 0;">🐉 Lab07</h3>
  <div id="status">⏳ Iniciando...</div>
  <div style="margin-top:0.4em;">
    <span class="badge" id="b-blue">🔵 Azul</span>
    <span class="badge" id="b-red">🔴 Rojo</span>
  </div>
</div>

<a-scene
  mindar-image="imageTargetSrc: ./targets.mind; filterMinCF: 0.0001; filterBeta: 0.001"
  vr-mode-ui="enabled: false"
  device-orientation-permission-ui="enabled: false"
  renderer="colorManagement: true; physicallyCorrectLights: true">

  <a-assets>
    <a-asset-item id="blue-model" src="./models/Blue.glb"></a-asset-item>
    <a-asset-item id="red-model" src="./models/Red.glb"></a-asset-item>
  </a-assets>

  <a-camera position="0 0 0" look-controls="enabled: false"></a-camera>

  <a-light type="ambient" color="#ffffff" intensity="0.6"></a-light>
  <a-light type="directional" color="#ffffff" intensity="0.8" position="1 1 1"></a-light>

  <!-- Target 0: Azul -->
  <a-entity mindar-image-target="targetIndex: 0">
    <a-gltf-model
      src="#blue-model"
      scale="1.5 1.5 1.5"
      position="0 0.05 0.05"
      animation-mixer="clip: *; loop: repeat">
    </a-gltf-model>
  </a-entity>

  <!-- Target 1: Rojo -->
  <a-entity mindar-image-target="targetIndex: 1">
    <a-gltf-model
      src="#red-model"
      scale="1.5 1.5 1.5"
      position="0 0.05 0.05"
      animation-mixer="clip: *; loop: repeat">
    </a-gltf-model>
  </a-entity>

</a-scene>

<script>
const status = document.getElementById('status');
const bBlue = document.getElementById('b-blue');
const bRed = document.getElementById('b-red');

const t0 = document.querySelector('[mindar-image-target="targetIndex: 0"]');
t0.addEventListener('targetFound', () => {
  bBlue.classList.add('on-blue');
  status.textContent = '🎯 Azul detectado';
});
t0.addEventListener('targetLost', () => {
  bBlue.classList.remove('on-blue');
  status.textContent = '👀 Buscando...';
});

const t1 = document.querySelector('[mindar-image-target="targetIndex: 1"]');
t1.addEventListener('targetFound', () => {
  bRed.classList.add('on-red');
  status.textContent = '🎯 Rojo detectado';
});
t1.addEventListener('targetLost', () => {
  bRed.classList.remove('on-red');
  status.textContent = '👀 Buscando...';
});

document.querySelector('a-scene').addEventListener('loaded', () => {
  status.textContent = '✅ Listo. Muestra tarjeta.';
});
</script>

</body>
</html>
