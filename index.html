<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<title>Lab07: Dragones AR</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  html, body {
    width: 100%;
    height: 100%;
    overflow: hidden;
    background: #000;
    font-family: sans-serif;
  }
  #ui {
    position: absolute;
    top: 10px;
    left: 10px;
    z-index: 10;
    padding: 0.8em 1em;
    background: rgba(0,0,0,0.8);
    color: #fff;
    font-size: 0.85em;
    border-radius: 8px;
    max-width: 360px;
  }
  .badge {
    display: inline-block;
    padding: 0.2em 0.5em;
    margin: 0.15em;
    border-radius: 4px;
    background: #444;
    color: #aaa;
    font-size: 0.8em;
  }
  .badge.on-blue { background: #50a8fc; color: #000; }
  .badge.on-red { background: #ff5050; color: #000; }
  #debug {
    margin-top: 0.4em;
    font-size: 0.72em;
    color: #aaa;
    max-height: 100px;
    overflow-y: auto;
  }
</style>
<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
  }
}
</script>
</head>
<body>
<div id="ui">
  <h3 style="margin:0 0 0.3em 0;">🐉 Lab07</h3>
  <div id="status">Iniciando...</div>
  <div>
    <span class="badge" id="b-blue">🔵 Azul</span>
    <span class="badge" id="b-red">🔴 Rojo</span>
  </div>
  <div id="debug"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MindARThree } from 'mindar-image-three';

const status = document.getElementById('status');
const debug = document.getElementById('debug');
const bBlue = document.getElementById('b-blue');
const bRed = document.getElementById('b-red');

function log(msg) {
  console.log(msg);
  debug.innerHTML += msg + '<br>';
  debug.scrollTop = debug.scrollHeight;
}

fetch('./targets.mind')
  .then(r => {
    if (!r.ok) throw new Error('Status ' + r.status);
    log('✅ targets.mind OK');
    iniciar();
  })
  .catch(e => {
    log('❌ ' + e);
    status.textContent = '❌ Error targets.mind';
  });

async function iniciar() {
  const mindar = new MindARThree({
    container: document.body,
    imageTargetSrc: './targets.mind',
    filterMinCF: 0.0001,
    filterBeta: 0.001
  });

  const { renderer, scene, camera } = mindar;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
  scene.add(new THREE.DirectionalLight(0xffffff, 1));

  const loader = new GLTFLoader();
  const mixers = [];
  const clock = new THREE.Clock();

  // ===== AZUL (funciona, no lo tocamos) =====
  const a0 = mindar.addAnchor(0);
  const c0 = new THREE.Mesh(
    new THREE.BoxGeometry(0.06, 0.06, 0.06),
    new THREE.MeshBasicMaterial({ color: 0x50a8fc, wireframe: true })
  );
  c0.position.set(0, 0.05, 0.05);
  a0.group.add(c0);

  a0.onTargetFound = () => { bBlue.classList.add('on-blue'); status.textContent = '🎯 Azul'; log('🎯 Azul FOUND'); };
  a0.onTargetLost = () => { bBlue.classList.remove('on-blue'); status.textContent = '👀 Buscando'; log('👀 Azul LOST'); };

  loader.load('./models/Blue.glb', (gltf) => {
    c0.visible = false;
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const c = box.getCenter(new THREE.Vector3());
    model.position.set(-c.x, -c.y, -c.z);

    const container = new THREE.Group();
    container.scale.set(1.5, 1.5, 1.5);
    container.position.set(0, 0.05, 0.05);
    container.add(model);
    a0.group.add(container);

    if (gltf.animations[4]) {
      const mixer = new THREE.AnimationMixer(model);
      mixer.clipAction(gltf.animations[4]).play();
      mixers.push({ mixer, anchor: a0 });
      log('🎬 Azul anim 4');
    }
  });

  // ===== ROJO (compensando transformaciones de Unity) =====
  const a1 = mindar.addAnchor(1);
  
  // Cubo de fallback (si el modelo nunca aparece, este sí se verá)
  const fallback = new THREE.Mesh(
    new THREE.BoxGeometry(0.15, 0.15, 0.15),
    new THREE.MeshBasicMaterial({ color: 0xff0000 })
  );
  fallback.position.set(0, 0.2, 0.1);
  a1.group.add(fallback);

  a1.onTargetFound = () => { 
    bRed.classList.add('on-red'); 
    status.textContent = '🎯 Rojo'; 
    log('🎯 Rojo FOUND'); 
  };
  a1.onTargetLost = () => { 
    bRed.classList.remove('on-red'); 
    status.textContent = '👀 Buscando'; 
    log('👀 Rojo LOST'); 
  };

  loader.load('./models/Red.glb', (gltf) => {
    log('✅ Rojo GLB cargado');
    
    const model = gltf.scene;
    
    // DIAGNÓSTICO
    let meshes = 0, verts = 0;
    model.traverse(c => { if (c.isMesh) { meshes++; verts += c.geometry.attributes.position.count; } });
    log(`📊 Rojo: ${meshes} meshes, ${verts} vértices`);

    // ============================================
    // COMPENSACIÓN DE UNITY:
    // - El modelo en Unity tenía Scale 0.05 → el GLB puede tener escala interna 0.05
    // - El modelo en Unity tenía Rotation Y 180 → boca abajo en el GLB
    // ============================================
    
    // 1. Resetear transformación del nodo raíz (por si Unity bakeó algo)
    model.position.set(0, 0, 0);
    model.rotation.set(0, 0, 0);
    model.scale.set(1, 1, 1);
    
    // 2. Contenedor con compensaciones:
    //    - Escala 30 para compensar el 0.05 interno de Unity (1.5 / 0.05 = 30)
    //    - Rotación Y 180 para compensar la rotación de Unity (lo pone boca arriba)
    const container = new THREE.Group();
    container.scale.set(30, 30, 30);
    container.rotation.y = Math.PI; // 180°
    container.position.set(0, 0.2, 0.1); // Más arriba y hacia cámara
    
    // 3. Pintar de rojo brillante para garantizar visibilidad
    model.traverse((child) => {
      if (child.isMesh) {
        child.material = new THREE.MeshBasicMaterial({ 
          color: 0xff0000, 
          side: THREE.DoubleSide 
        });
      }
    });
    
    container.add(model);
    a1.group.add(container);
    
    // Si el modelo se ve, ocultar el fallback
    fallback.visible = false;

    // Bounding box final
    const box = new THREE.Box3().setFromObject(container);
    const size = box.getSize(new THREE.Vector3());
    log('📏 Rojo tamaño: ' + size.x.toFixed(2) + ' x ' + size.y.toFixed(2) + ' x ' + size.z.toFixed(2));

    if (gltf.animations[5]) {
      const mixer = new THREE.AnimationMixer(model);
      mixer.clipAction(gltf.animations[5]).play();
      mixers.push({ mixer, anchor: a1 });
      log('🎬 Rojo anim 5');
    }
  });

  renderer.setAnimationLoop(() => {
    const delta = clock.getDelta();
    for (const item of mixers) {
      if (item.anchor.visible) item.mixer.update(delta);
    }
    renderer.render(scene, camera);
  });

  await mindar.start();
  status.textContent = '✅ Listo. Muestra tarjeta.';
  log('✅ Cámara iniciada');
}
</script>
</body>
</html>
