<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, user-scalable=no, minimum-scale=1.0, maximum-scale=1.0">
<title>Lab07: Dragones AR</title>
<style>
  * { margin: 0; box-sizing: border-box; }
  body { overflow: hidden; width: 100vw; height: 100vh; background: #000; font-family: sans-serif; }
  #ui { position: absolute; top: 0; left: 0; z-index: 10; padding: 1em; background: rgba(0,0,0,0.8); color: #fff; font-size: 0.9em; max-width: 400px; }
  .badge { display: inline-block; padding: 0.2em 0.5em; margin: 0.2em; border-radius: 4px; background: #333; color: #888; font-size: 0.8em; }
  .badge.on { background: #51cf66; color: #000; }
</style>
<script async src="https://unpkg.com/es-module-shims@1.3.6/dist/es-module-shims.js"></script>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/",
    "mindar-image-three": "https://cdn.jsdelivr.net/npm/mind-ar@1.2.2/dist/mindar-image-three.prod.js"
  }
}
</script>
</head>
<body>
<div id="ui">
  <h2>🐉 Lab07</h2>
  <div id="status">Iniciando...</div>
  <div>
    <span class="badge" id="b-blue">🔵 Azul</span>
    <span class="badge" id="b-red">🔴 Rojo</span>
  </div>
  <div id="debug" style="margin-top:0.5em;font-size:0.75em;color:#aaa;"></div>
</div>

<script type="module">
import * as THREE from 'three';
import { GLTFLoader } from 'three/addons/loaders/GLTFLoader.js';
import { MindARThree } from 'mindar-image-three';

const status = document.getElementById('status');
const debug = document.getElementById('debug');
const bBlue = document.getElementById('b-blue');
const bRed = document.getElementById('b-red');

function log(msg) {
  console.log(msg);
  debug.innerHTML += msg + '<br>';
}

fetch('./targets.mind')
  .then(r => r.ok ? iniciar() : Promise.reject(r.status))
  .catch(e => status.textContent = '❌ targets.mind: ' + e);

async function iniciar() {
  const mindar = new MindARThree({
    container: document.body,
    imageTargetSrc: './targets.mind',
    filterMinCF: 0.0001,
    filterBeta: 0.001
  });

  const { renderer, scene, camera } = mindar;
  renderer.outputColorSpace = THREE.SRGBColorSpace;

  scene.add(new THREE.HemisphereLight(0xffffff, 0x444444, 1));
  scene.add(new THREE.DirectionalLight(0xffffff, 1));

  const loader = new GLTFLoader();
  const clock = new THREE.Clock();

  // ===== AZUL =====
  const a0 = mindar.addAnchor(0);
  const c0 = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.1), new THREE.MeshBasicMaterial({color:0x50a8fc,wireframe:true}));
  a0.group.add(c0);
  a0.onTargetFound = () => { bBlue.classList.add('on'); status.textContent='🎯 Azul'; };
  a0.onTargetLost = () => { bBlue.classList.remove('on'); status.textContent='👀 Buscando'; };

  loader.load('./models/Blue.glb', (gltf) => {
    c0.visible = false;
    const model = gltf.scene;
    const box = new THREE.Box3().setFromObject(model);
    const c = box.getCenter(new THREE.Vector3());
    model.position.set(-c.x, -c.y, -c.z);

    const container = new THREE.Group();
    container.scale.set(1.5,1.5,1.5);
    container.position.set(0, 0.05, 0.05);
    container.add(model);
    a0.group.add(container);

    if (gltf.animations[4]) {
      const mixer = new THREE.AnimationMixer(model);
      mixer.clipAction(gltf.animations[4]).play();
      mindar.onUpdate = (dt) => mixer.update(dt);
    }
  });

  // ===== ROJO =====
  const a1 = mindar.addAnchor(1);
  const c1 = new THREE.Mesh(new THREE.BoxGeometry(0.1,0.1,0.1), new THREE.MeshBasicMaterial({color:0xff0000,wireframe:true}));
  a1.group.add(c1);
  a1.onTargetFound = () => { bRed.classList.add('on'); status.textContent='🎯 Rojo'; };
  a1.onTargetLost = () => { bRed.classList.remove('on'); status.textContent='👀 Buscando'; };

  loader.load('./models/Red.glb', (gltf) => {
    c1.visible = false;
    const model = gltf.scene;

    // DIAGNÓSTICO: ¿Dónde está el nodo raíz antes de resetear?
    log(`📐 [red] Raíz pos: ${model.position.x.toFixed(2)}, ${model.position.y.toFixed(2)}, ${model.position.z.toFixed(2)}`);
    log(`📐 [red] Raíz scale: ${model.scale.x.toFixed(2)}, ${model.scale.y.toFixed(2)}, ${model.scale.z.toFixed(2)}`);

    // RESET completo de la transformación del nodo raíz
    model.position.set(0, 0, 0);
    model.rotation.set(0, 0, 0);
    model.scale.set(1, 1, 1);

    const container = new THREE.Group();
    container.scale.set(1.5, 1.5, 1.5);
    container.position.set(0, 0.05, 0.05);
    container.add(model);
    a1.group.add(container);

    // Verificar bounding box después del reset
    const box = new THREE.Box3().setFromObject(container);
    const size = box.getSize(new THREE.Vector3());
    log(`📏 [red] Tamaño contenedor: ${size.x.toFixed(2)} x ${size.y.toFixed(2)} x ${size.z.toFixed(2)}`);

    if (gltf.animations[5]) {
      const mixer = new THREE.AnimationMixer(model);
      mixer.clipAction(gltf.animations[5]).play();
      const old = mindar.onUpdate;
      mindar.onUpdate = (dt) => { old && old(dt); mixer.update(dt); };
    }
  });

  renderer.setAnimationLoop(() => renderer.render(scene, camera));
  await mindar.start();
  status.textContent = '✅ Listo. Muestra tarjeta.';
}
</script>
</body>
</html>
